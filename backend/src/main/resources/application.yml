server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/genesis_ranking;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32-bytes-min}
    expiration-minutes: ${JWT_EXP_MIN:720}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}
    allowed-origin-patterns: ${CORS_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,https://*.ngrok-free.app,https://*.ngrok.app,https://*.ngrok.io}
  bootstrap:
    admin:
      username: ${BOOTSTRAP_ADMIN_USER:admin}
      password: ${BOOTSTRAP_ADMIN_PASS:admin123}
      name: ${BOOTSTRAP_ADMIN_NAME:Administrador}
      role: ${BOOTSTRAP_ADMIN_ROLE:ADMIN}
  social:
    instagram:
      base-url: ${INSTAGRAM_API_BASE_URL:https://graph.instagram.com}
      web-base-url: ${INSTAGRAM_WEB_BASE_URL:https://www.instagram.com}
      access-token: ${INSTAGRAM_ACCESS_TOKEN:}
      user-id: ${INSTAGRAM_USER_ID:}
      username: ${INSTAGRAM_USERNAME:genesis_esportes}
      default-limit: ${INSTAGRAM_FEED_LIMIT:10}
  registration-email:
    enabled: ${REG_CONFIRM_EMAIL_ENABLED:true}
    from: ${REG_CONFIRM_EMAIL_FROM:no-reply@genesisesportes.com.br}
    reply-to: ${REG_CONFIRM_EMAIL_REPLY_TO:contato@genesisesportes.com.br}
    subject-prefix: ${REG_CONFIRM_EMAIL_SUBJECT_PREFIX:Genesis Esportes}
  event-announcement-email:
    enabled: ${EVENT_ANNOUNCEMENT_EMAIL_ENABLED:true}
    include-platform-accounts: ${EVENT_ANNOUNCEMENT_INCLUDE_PLATFORM_ACCOUNTS:true}
    from: ${EVENT_ANNOUNCEMENT_EMAIL_FROM:no-reply@genesisesportes.com.br}
    reply-to: ${EVENT_ANNOUNCEMENT_EMAIL_REPLY_TO:contato@genesisesportes.com.br}
    subject-prefix: ${EVENT_ANNOUNCEMENT_EMAIL_SUBJECT_PREFIX:Genesis Esportes}
    events-page-url: ${EVENT_ANNOUNCEMENT_EVENTS_PAGE_URL:https://genesisesportes.com.br/eventos}
  coach-athlete-email:
    enabled: ${COACH_ATHLETE_EMAIL_ENABLED:true}
    from: ${COACH_ATHLETE_EMAIL_FROM:no-reply@genesisesportes.com.br}
    reply-to: ${COACH_ATHLETE_EMAIL_REPLY_TO:contato@genesisesportes.com.br}
    subject-prefix: ${COACH_ATHLETE_EMAIL_SUBJECT_PREFIX:Genesis Esportes}
  stripe:
    api-key: ${STRIPE_API_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
